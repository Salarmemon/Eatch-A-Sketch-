<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <link rel="stylesheet" href="styles.css"/>
    <meta name="Description" content="Etch A Sketch is a web-based project that allows users to draw on a grid using their mouse"
</head>
<body>
    <header>
    <h1 id="title">Etch A Sketch</h1>
    </header>

    <main id="main-content">
    <aside id="control-panel">
        <input type="color" id="color-picker"/>

        <div class="modes">
            <button id="color-mode" class="mode">Color Mode</button>
            <button id="rainbow-mode" class="mode">Rainbow Mode</button>
            <button id="black-and-white-mode" class="mode">Black and White</button>
            <button id="erase-mode" class="mode">Erase  Mode</button>
        </div>

        <button id="clear-btn">Clear</button>
        
        <input type="range" value="16" min="1" max="100" id="grid-slidbar"/>
        <label for="grid-slidbar">Grid Size: <span id="grid-value">16</span></label> 
    </aside>

    <div id="drawing-grid"></div>

    </main>

    <script src="script.js"></script>
</body>
</html>
