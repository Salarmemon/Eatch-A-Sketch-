<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch A Sketch</title>
    <link rel="stylesheet" href="styles.css"/>
    <meta name="Description" content="Etch A Sketch is a web-based project that allows users to draw on a grid using their mouse"
</head>
<body>
    <h1 id="title">Etch A Sketch</h1>
    <aside id="control-panel">
        <input type="color"/>

        <div class="modes">
            <buttom id="color-mode">Color Mode</buttom>
            <button id="rainbow-mode">Rainbow Mode</button>
            <button id="black-and-white-mode">Black and White</button>
            <button id="erase-mode">Erase  Mode</button>
        </div>

        <button id="clear-btn">Clear</button>
        
    </aside>

    <div id="drawing-grid"></div>
</body>
</html>
